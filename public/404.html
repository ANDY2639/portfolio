<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      
      // This script takes the current URL path and converts it to a query string
      // parameter, then redirects to the base URL with the path as a query parameter.
      // The index.html page will then read the query parameter and use it to
      // navigate to the correct page using the HTML5 History API.
      
      var pathSegmentsToKeep = 1; // Keep '/portfolio' in the path
      
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <!-- GitHub Pages will show this while redirecting -->
    <noscript>
      <p>JavaScript is required to navigate this site.</p>
    </noscript>
  </body>
</html>
